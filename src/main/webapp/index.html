<!DOCTYPE html>
<html>
<head>
    <title>Can You Survive ZSgs?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 20px;
            display: grid;
            place-items: center;
        }

        .page {
            width: min(1100px, 100%);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        .hero, .card {
            background: rgba(30,41,59,0.7);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero { min-height: 500px; }

        h1 { font-size: 50px; margin: 0; }
        h2 { margin-bottom: 20px; }

        .intro { color: #94a3b8; }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }

        input {
            height: 45px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            padding: 10px;
        }

        button {
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        @media (max-width: 800px) {
            .page { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
<div class="page">

    <section class="hero">
        <h1>Can You Survive ZSgs?</h1>
        <p class="intro">
            Enter your daily student stats and get your survival score instantly.
        </p>
    </section>

    <section class="card">
        <h2>Enter Details</h2>

        <!-- IMPORTANT FIX: relative path -->
        <form action="Assignment2" method="post">

            <label>Coffee/Tea per day
                <input type="number" name="coffee" value="3" min="0">
            </label>

            <label>Sleep hours
                <input type="number" name="sleep" value="7.5" step="0.5" min="0" max="24">
            </label>

            <label>Backlogs
                <input type="number" name="backlog" value="2" min="0">
            </label>

            <label>LeetCode solved
                <input type="number" name="leetcode" value="120" min="0">
            </label>

            <label>Assessment score
                <input type="number" name="assessment" value="4" min="0">
            </label>

            <button type="submit">Calculate Survival</button>
        </form>
    </section>

</div>
</body>
</html>
